apis:
- aid: ai21-labs:chat-completions
  name: AI21 Jamba Chat Completions API
  description: Conversational completions endpoint backed by the Jamba family of hybrid
    Mamba/Transformer models (Jamba 1.5 Mini, Jamba 1.5 Large, Jamba 1.6). Accepts
    a message array, system prompts, temperature, max tokens, tools, and streaming,
    returning assistant messages with usage metadata.
  humanURL: https://docs.ai21.com/reference
  baseURL: https://api.ai21.com/studio/v1
  tags:
  - Chat
  - Completions
  - Jamba
  - LLM
