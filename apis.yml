aid: ai21-labs
name: AI21 Labs
description: AI21 Labs is an enterprise foundation-model company best known for the
  Jamba family of open-weight hybrid Mamba/Transformer models and AI21 Maestro, a
  dynamic planning system that orchestrates tools, retrieval, and validated output
  during inference. The platform exposes a Bearer-token REST API at api.ai21.com covering
  chat completions, conversational RAG over a managed file library, batch processing,
  fine-tuning, and function calling. Official Python and TypeScript SDKs wrap the
  API with sync and async clients and integrate natively into LangChain and LlamaIndex.
  Jamba weights are also published on Hugging Face for self-hosted vLLM deployment.
