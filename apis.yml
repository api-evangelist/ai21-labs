    url: https://docs.ai21.com/reference
  - type: AsyncAPI
    url: https://raw.githubusercontent.com/api-evangelist/ai21-labs/refs/heads/main/asyncapi/ai21-labs-asyncapi.yml
  - url: graphql/ai21-labs-graphql.md
    type: GraphQL
- aid: ai21-labs:maestro
  name: AI21 Maestro API
  description: Dynamic planning system that, at inference time, determines the optimal
    sequence of actions to solve a task. Exposes run creation and retrieval endpoints,
    supports validated output for strict instruction following, and orchestrates RAG,
    web search, file libraries, MCP tools, and custom HTTP tools.
  humanURL: https://docs.ai21.com/docs/maestro
  baseURL: https://api.ai21.com/studio/v1
  tags:
  - Maestro
  - Planning
  - Agents
  - Validated Output
  properties:
  - type: Documentation
    url: https://docs.ai21.com/docs/maestro
- aid: ai21-labs:library
  name: AI21 File Library API
  description: Managed file storage for RAG workflows. Upload, list, retrieve, update,
    and delete documents that Maestro and Jamba endpoints can ground on at inference
    time.
  humanURL: https://docs.ai21.com/reference
  baseURL: https://api.ai21.com/studio/v1
  tags:
  - Files
  - RAG
  - Library
  - Documents
  properties:
  - type: Documentation
    url: https://docs.ai21.com/reference
- aid: ai21-labs:batch
  name: AI21 Batch API
  description: Asynchronous batch processing for large volumes of Jamba completions.
    Submit a batch job, poll for status, and download results when the run completes.
  humanURL: https://docs.ai21.com/reference
  baseURL: https://api.ai21.com/studio/v1
  tags:
  - Batch
  - Async
  - Inference
  properties:
  - type: Documentation
    url: https://docs.ai21.com/reference
- aid: ai21-labs:fine-tuning
  name: AI21 Fine-Tuning API
  description: Fine-tuning service for Jamba models supporting full, LoRA, and QLoRA
    strategies. Create training jobs from uploaded datasets and deploy the resulting
    model variants behind the standard chat completions endpoint.
